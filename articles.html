---
layout: default
title: Articles
---

<div class="page">
  <div class="index-header">
    <h1>Articles</h1>
    <p>Articles on teaching Digital Technologies in Australian schools</p>
  </div>

  <div class="article-grid">
    {% for article in site.articles %}
      <a href="{{ article.url | relative_url }}" class="plan-card">
        <h2>{{ article.title }}</h2>
	    {{ article.excerpt | strip_html }}
        <div class="pc-arrow">View article →</div>
      </a>
    {% endfor %}
  </div>
</div>
