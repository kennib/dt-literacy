<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>

  <header class="site-header">
    {% assign first_folder = page.url | split: '/' | slice: 1 | first %}
    <a class="site-brand" href="{{ '/' | relative_url }}">🧑‍💻 Kenni <span>Digi</span>tech</a>
    <nav class="site-nav">
      <a class="nav-link {% if first_folder == 'articles' %}active{% endif %}"
         href="{{ '/articles' | relative_url }}">Articles</a>
      <a class="nav-link {% if first_folder == 'lesson-plans' %}active{% endif %}"
         href="{{ '/lesson-plans' | relative_url }}">Lesson Plans</a>
    </nav>
  </header>

  {{ content }}

  <footer class="site-footer">
    <div class="page footer-content">
      <p class="license">
        <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">
	  <img src="https://mirrors.creativecommons.org/presskit/buttons/88x31/svg/by.svg" height="15px" /></a>
        <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a>
        — Content licensed under Creative Commons Attribution 4.0.<br/>
        You're free to share, copy, and modify with attribution to Kenni Bawden.
      </p>
    </div>
  </footer>

</body>
</html>
